# CodeQL security analysis workflow
# Documentation: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning
# Note: Currently set to manual trigger only. This project is primarily Ansible/YAML.
#       Enable automatic triggers when Python application code is added (e.g., backup scripts).

name: "CodeQL Security Scan"

on:
  workflow_dispatch:  # Manual trigger only via Actions tab
  # Uncomment when Python application code is added:
  # push:
  #   branches: [ "main" ]
  #   paths:
  #     - '**.py'
  # pull_request:
  #   branches: [ "main" ]
  #   paths:
  #     - '**.py'
  # schedule:
  #   - cron: '0 9 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
        # CodeQL supports: 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby'
        # Learn more: https://aka.ms/codeql-docs/language-support

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.
        # queries: security-extended,security-and-quality

    # Autobuild attempts to build any compiled languages (C/C++, C#, Go, or Java).
    # For Python, this step is typically not needed, but we include it for consistency.
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
